name: Deploy landing page

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy site to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Deploys the static site/ directory to the "skyquery" Pages project, which
      # serves the production URL https://skyquery.pages.dev (no random subdomain).
      # Requires two repo secrets: CLOUDFLARE_API_TOKEN (Pages:Edit) and
      # CLOUDFLARE_ACCOUNT_ID. See SETUP.md for the one-time setup.
      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=skyquery --branch=main
