name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, typecheck, and test (offline, zero keys)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install project (dev extras)
        run: uv pip install --system -e ".[dev]"

      - name: Ruff lint
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests

      - name: Pyright typecheck
        run: pyright

      # The full suite runs green with no network and no API keys, proving the
      # replay-stub harness and the local-only trust model.
      - name: Pytest (replay mode, offline)
        env:
          SKYQUERY_REPLAY: "1"
          SKYQUERY_OFFLINE: "1"
        run: pytest -q --cov=skyquery --cov-report=term-missing
